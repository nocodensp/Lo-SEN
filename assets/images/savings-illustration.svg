<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="savingsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="url(#savingsGrad)" />
  
  <!-- Coin stack -->
  <g opacity="0.3">
    <ellipse cx="170" cy="180" rx="25" ry="8" fill="#06b6d4"/>
    <ellipse cx="170" cy="175" rx="25" ry="8" fill="#06b6d4"/>
    <ellipse cx="170" cy="170" rx="25" ry="8" fill="#06b6d4"/>
    
    <ellipse cx="230" cy="190" rx="20" ry="6" fill="#06b6d4"/>
    <ellipse cx="230" cy="185" rx="20" ry="6" fill="#06b6d4"/>
  </g>
  
  <!-- Central piggy bank/coin -->
  <g transform="translate(200, 150)">
    <!-- Piggy bank body -->
    <ellipse cx="0" cy="10" rx="35" ry="25" fill="white" stroke="#06b6d4" stroke-width="2"/>
    
    <!-- Piggy bank head -->
    <ellipse cx="-20" cy="-5" rx="15" ry="12" fill="white" stroke="#06b6d4" stroke-width="2"/>
    
    <!-- Piggy bank details -->
    <circle cx="-25" cy="-5" r="2" fill="#06b6d4"/> <!-- Eye -->
    <path d="M-35 -5 Q-40 -3 -38 0" stroke="#06b6d4" stroke-width="1.5" fill="none"/> <!-- Snout -->
    
    <!-- Coin slot -->
    <rect x="-5" y="-15" width="10" height="2" fill="#06b6d4" rx="1"/>
    
    <!-- Legs -->
    <rect x="-15" y="25" width="4" height="8" fill="white" stroke="#06b6d4" stroke-width="1" rx="2"/>
    <rect x="-5" y="25" width="4" height="8" fill="white" stroke="#06b6d4" stroke-width="1" rx="2"/>
    <rect x="5" y="25" width="4" height="8" fill="white" stroke="#06b6d4" stroke-width="1" rx="2"/>
    <rect x="15" y="25" width="4" height="8" fill="white" stroke="#06b6d4" stroke-width="1" rx="2"/>
    
    <!-- Large coin going in -->
    <g transform="translate(15, -20)">
      <ellipse cx="0" cy="0" rx="12" ry="12" fill="url(#coinGrad)"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold">€</text>
    </g>
  </g>
  
  <!-- Floating coins -->
  <g transform="translate(120, 80)">
    <ellipse cx="0" cy="0" rx="8" ry="8" fill="#06b6d4" opacity="0.6"/>
    <text x="0" y="3" text-anchor="middle" fill="white" font-size="6" font-weight="bold">€</text>
  </g>
  
  <g transform="translate(280, 90)">
    <ellipse cx="0" cy="0" rx="6" ry="6" fill="#06b6d4" opacity="0.5"/>
    <text x="0" y="2" text-anchor="middle" fill="white" font-size="5" font-weight="bold">€</text>
  </g>
  
  <g transform="translate(130, 200)">
    <ellipse cx="0" cy="0" rx="7" ry="7" fill="#06b6d4" opacity="0.7"/>
    <text x="0" y="2.5" text-anchor="middle" fill="white" font-size="5" font-weight="bold">€</text>
  </g>
  
  <!-- Upward arrow -->
  <g transform="translate(320, 180)" opacity="0.6">
    <path d="M0 15 L0 0" stroke="#06b6d4" stroke-width="2"/>
    <path d="M-5 5 L0 0 L5 5" stroke="#06b6d4" stroke-width="2" fill="none"/>
  </g>
</svg>
