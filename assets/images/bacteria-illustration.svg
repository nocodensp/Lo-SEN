<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bacteriaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="microbeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="150" r="120" fill="url(#bacteriaGrad)" />
  
  <!-- Bacteria visualization -->
  <g transform="translate(150, 150)">
    <!-- Bacteria 1 - Rod shaped -->
    <g transform="translate(-30, -20) rotate(25)">
      <ellipse cx="0" cy="0" rx="12" ry="6" fill="url(#microbeGrad)"/>
      <ellipse cx="0" cy="0" rx="3" ry="3" fill="rgba(255, 255, 255, 0.3)"/>
      <!-- Flagella -->
      <path d="M-12 0 Q-18 -3 -20 -8" stroke="#dc2626" stroke-width="1" fill="none"/>
      <path d="M12 0 Q18 -2 22 -6" stroke="#dc2626" stroke-width="1" fill="none"/>
    </g>
    
    <!-- Bacteria 2 - Spherical -->
    <g transform="translate(25, -15)">
      <circle cx="0" cy="0" r="8" fill="url(#microbeGrad)"/>
      <circle cx="0" cy="0" r="2" fill="rgba(255, 255, 255, 0.3)"/>
      <!-- Cilia -->
      <g transform="rotate(0)">
        <path d="M0 -8 L0 -12" stroke="#dc2626" stroke-width="0.5"/>
      </g>
      <g transform="rotate(60)">
        <path d="M0 -8 L0 -12" stroke="#dc2626" stroke-width="0.5"/>
      </g>
      <g transform="rotate(120)">
        <path d="M0 -8 L0 -12" stroke="#dc2626" stroke-width="0.5"/>
      </g>
      <g transform="rotate(180)">
        <path d="M0 -8 L0 -12" stroke="#dc2626" stroke-width="0.5"/>
      </g>
      <g transform="rotate(240)">
        <path d="M0 -8 L0 -12" stroke="#dc2626" stroke-width="0.5"/>
      </g>
      <g transform="rotate(300)">
        <path d="M0 -8 L0 -12" stroke="#dc2626" stroke-width="0.5"/>
      </g>
    </g>
    
    <!-- Bacteria 3 - Spiral shaped -->
    <g transform="translate(-20, 20)">
      <path d="M0 0 Q-5 -8 0 -15 Q5 -22 0 -30 Q-5 -37 0 -45" 
            stroke="url(#microbeGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="2" fill="rgba(255, 255, 255, 0.3)"/>
      <circle cx="0" cy="-15" r="2" fill="rgba(255, 255, 255, 0.3)"/>
      <circle cx="0" cy="-30" r="2" fill="rgba(255, 255, 255, 0.3)"/>
      <circle cx="0" cy="-45" r="2" fill="rgba(255, 255, 255, 0.3)"/>
    </g>
    
    <!-- Bacteria 4 - Cluster -->
    <g transform="translate(30, 15)">
      <circle cx="0" cy="0" r="5" fill="url(#microbeGrad)"/>
      <circle cx="8" cy="2" r="4" fill="url(#microbeGrad)"/>
      <circle cx="6" cy="8" r="4" fill="url(#microbeGrad)"/>
      <circle cx="-2" cy="7" r="3" fill="url(#microbeGrad)"/>
      <circle cx="-5" cy="2" r="4" fill="url(#microbeGrad)"/>
      <!-- Internal details -->
      <circle cx="0" cy="0" r="1" fill="rgba(255, 255, 255, 0.3)"/>
      <circle cx="8" cy="2" r="1" fill="rgba(255, 255, 255, 0.3)"/>
      <circle cx="6" cy="8" r="1" fill="rgba(255, 255, 255, 0.3)"/>
    </g>
    
    <!-- Bacteria 5 - Large rod -->
    <g transform="translate(-10, -35) rotate(-15)">
      <ellipse cx="0" cy="0" rx="15" ry="7" fill="url(#microbeGrad)"/>
      <ellipse cx="0" cy="0" rx="4" ry="4" fill="rgba(255, 255, 255, 0.3)"/>
      <!-- Flagella -->
      <path d="M-15 0 Q-22 -4 -25 -10" stroke="#dc2626" stroke-width="1" fill="none"/>
      <path d="M15 0 Q22 -3 26 -8" stroke="#dc2626" stroke-width="1" fill="none"/>
      <path d="M-15 0 Q-20 3 -23 8" stroke="#dc2626" stroke-width="1" fill="none"/>
    </g>
    
    <!-- Bacteria 6 - Small cocci -->
    <g transform="translate(15, 35)">
      <circle cx="0" cy="0" r="3" fill="url(#microbeGrad)"/>
      <circle cx="5" cy="-2" r="2.5" fill="url(#microbeGrad)"/>
      <circle cx="3" cy="3" r="2" fill="url(#microbeGrad)"/>
      <circle cx="-3" cy="2" r="2.5" fill="url(#microbeGrad)"/>
    </g>
    
    <!-- Bio contamination warning -->
    <g transform="translate(0, -70)">
      <circle cx="0" cy="0" r="15" fill="#dc2626" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-size="18" font-weight="bold">⚠</text>
    </g>
  </g>
  
  <!-- Water contamination visualization -->
  <g transform="translate(150, 150)" opacity="0.3">
    <rect x="-60" y="60" width="120" height="20" fill="rgba(59, 130, 246, 0.2)" rx="10"/>
    <text x="0" y="75" text-anchor="middle" fill="#3b82f6" font-size="8" opacity="0.8">Contaminated Water</text>
  </g>
  
  <!-- Floating bacteria -->
  <g transform="translate(80, 80) scale(0.4)">
    <ellipse cx="0" cy="0" rx="12" ry="6" fill="#dc2626" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="3" ry="3" fill="rgba(255, 255, 255, 0.3)"/>
  </g>
  
  <g transform="translate(220, 90) scale(0.3)">
    <circle cx="0" cy="0" r="8" fill="#dc2626" opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="rgba(255, 255, 255, 0.3)"/>
  </g>
  
  <g transform="translate(90, 220) scale(0.35) rotate(45)">
    <path d="M0 0 Q-5 -8 0 -15 Q5 -22 0 -30" 
          stroke="#dc2626" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Warning particles -->
  <circle cx="80" cy="120" r="2" fill="#dc2626" opacity="0.4"/>
  <circle cx="220" cy="130" r="1.5" fill="#dc2626" opacity="0.3"/>
  <circle cx="90" cy="180" r="2" fill="#dc2626" opacity="0.5"/>
  <circle cx="210" cy="170" r="1.8" fill="#dc2626" opacity="0.4"/>
</svg>
