<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="healthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="url(#healthGrad)" />
  
  <!-- Water drops -->
  <path d="M120 100 Q110 120 120 140 Q130 120 120 100" fill="#3b82f6" opacity="0.6"/>
  <path d="M280 110 Q270 130 280 150 Q290 130 280 110" fill="#3b82f6" opacity="0.5"/>
  <path d="M150 180 Q140 200 150 220 Q160 200 150 180" fill="#3b82f6" opacity="0.4"/>
  
  <!-- Central heart with shield -->
  <g transform="translate(200, 150)">
    <!-- Shield background -->
    <path d="M0 -40 L-30 -20 L-30 10 Q-30 40 0 50 Q30 40 30 10 L30 -20 Z" 
          fill="white" stroke="#10b981" stroke-width="2"/>
    
    <!-- Heart inside shield -->
    <path d="M0 -10 C-5 -20 -20 -20 -20 -5 C-20 5 0 20 0 20 C0 20 20 5 20 -5 C20 -20 5 -20 0 -10Z" 
          fill="url(#heartGrad)"/>
    
    <!-- Plus sign -->
    <path d="M-8 -25 L8 -25 L8 -8 L25 -8 L25 8 L8 8 L8 25 L-8 25 L-8 8 L-25 8 L-25 -8 L-8 -8 Z" 
          fill="#10b981" opacity="0.8"/>
  </g>
  
  <!-- Floating particles -->
  <circle cx="80" cy="80" r="3" fill="#10b981" opacity="0.4"/>
  <circle cx="320" cy="90" r="2" fill="#10b981" opacity="0.3"/>
  <circle cx="100" cy="220" r="2.5" fill="#10b981" opacity="0.5"/>
  <circle cx="300" cy="200" r="2" fill="#10b981" opacity="0.4"/>
</svg>
