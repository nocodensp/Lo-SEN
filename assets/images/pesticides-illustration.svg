<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="plantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="150" r="120" fill="url(#pestGrad)" />
  
  <!-- Plant with pesticide drops -->
  <g transform="translate(150, 150)">
    <!-- Plant stem -->
    <path d="M0 40 Q-2 20 0 0 Q2 -20 0 -40" 
          stroke="#22c55e" stroke-width="4" fill="none"/>
    
    <!-- Leaves -->
    <g transform="translate(0, -20)">
      <!-- Left leaf -->
      <path d="M0 0 Q-20 -10 -25 -25 Q-20 -15 0 -5" 
            fill="url(#plantGrad)" stroke="#16a34a" stroke-width="1"/>
      <!-- Right leaf -->
      <path d="M0 0 Q20 -10 25 -25 Q20 -15 0 -5" 
            fill="url(#plantGrad)" stroke="#16a34a" stroke-width="1"/>
    </g>
    
    <g transform="translate(0, -35)">
      <!-- Top left leaf -->
      <path d="M0 0 Q-15 -8 -18 -20 Q-15 -12 0 -4" 
            fill="url(#plantGrad)" stroke="#16a34a" stroke-width="1"/>
      <!-- Top right leaf -->
      <path d="M0 0 Q15 -8 18 -20 Q15 -12 0 -4" 
            fill="url(#plantGrad)" stroke="#16a34a" stroke-width="1"/>
    </g>
    
    <!-- Pesticide drops -->
    <!-- Drop 1 -->
    <g transform="translate(-25, -15)">
      <path d="M0 -8 Q-6 0 0 8 Q6 0 0 -8" 
            fill="#f97316" opacity="0.8"/>
      <text x="0" y="2" text-anchor="middle" fill="white" font-size="6" font-weight="bold">P</text>
    </g>
    
    <!-- Drop 2 -->
    <g transform="translate(25, -20)">
      <path d="M0 -6 Q-4.5 0 0 6 Q4.5 0 0 -6" 
            fill="#f97316" opacity="0.7"/>
      <text x="0" y="2" text-anchor="middle" fill="white" font-size="5" font-weight="bold">P</text>
    </g>
    
    <!-- Drop 3 -->
    <g transform="translate(-15, 5)">
      <path d="M0 -5 Q-3.5 0 0 5 Q3.5 0 0 -5" 
            fill="#f97316" opacity="0.6"/>
      <text x="0" y="1.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold">P</text>
    </g>
    
    <!-- Drop 4 -->
    <g transform="translate(20, 10)">
      <path d="M0 -4 Q-3 0 0 4 Q3 0 0 -4" 
            fill="#f97316" opacity="0.7"/>
      <text x="0" y="1" text-anchor="middle" fill="white" font-size="4" font-weight="bold">P</text>
    </g>
    
    <!-- Falling drops -->
    <g transform="translate(-35, 25)">
      <path d="M0 -3 Q-2.5 0 0 3 Q2.5 0 0 -3" 
            fill="#f97316" opacity="0.5"/>
      <text x="0" y="1" text-anchor="middle" fill="white" font-size="3" font-weight="bold">P</text>
    </g>
    
    <g transform="translate(35, 20)">
      <path d="M0 -3 Q-2.5 0 0 3 Q2.5 0 0 -3" 
            fill="#f97316" opacity="0.5"/>
      <text x="0" y="1" text-anchor="middle" fill="white" font-size="3" font-weight="bold">P</text>
    </g>
    
    <!-- Soil/Ground -->
    <rect x="-50" y="45" width="100" height="15" fill="#8b4513" opacity="0.3" rx="5"/>
    
    <!-- Water contamination symbol -->
    <g transform="translate(0, 65)">
      <rect x="-20" y="-5" width="40" height="10" fill="rgba(59, 130, 246, 0.2)" rx="5"/>
      <circle cx="-10" cy="0" r="2" fill="#f97316" opacity="0.6"/>
      <circle cx="0" cy="0" r="2" fill="#f97316" opacity="0.6"/>
      <circle cx="10" cy="0" r="2" fill="#f97316" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Warning symbols -->
  <g transform="translate(150, 150)">
    <!-- Skull and crossbones warning -->
    <g transform="translate(0, -80) scale(0.8)">
      <!-- Skull -->
      <circle cx="0" cy="-5" r="8" fill="white" stroke="#f97316" stroke-width="2"/>
      <circle cx="-3" cy="-6" r="1.5" fill="#f97316"/>
      <circle cx="3" cy="-6" r="1.5" fill="#f97316"/>
      <path d="M-3 -2 Q0 0 3 -2" stroke="#f97316" stroke-width="1" fill="none"/>
      
      <!-- Crossbones -->
      <path d="M-12 5 L12 -15" stroke="#f97316" stroke-width="3"/>
      <path d="M-12 -15 L12 5" stroke="#f97316" stroke-width="3"/>
    </g>
    
    <!-- Radiation symbols -->
    <g opacity="0.4">
      <path d="M-40 -40 L-35 -30" stroke="#f97316" stroke-width="2"/>
      <path d="M40 -40 L35 -30" stroke="#f97316" stroke-width="2"/>
      <path d="M-40 40 L-35 30" stroke="#f97316" stroke-width="2"/>
      <path d="M40 40 L35 30" stroke="#f97316" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Floating pesticide particles -->
  <circle cx="80" cy="80" r="2" fill="#f97316" opacity="0.4"/>
  <circle cx="220" cy="90" r="1.5" fill="#f97316" opacity="0.3"/>
  <circle cx="90" cy="220" r="2" fill="#f97316" opacity="0.5"/>
  <circle cx="210" cy="210" r="1.8" fill="#f97316" opacity="0.4"/>
</svg>
