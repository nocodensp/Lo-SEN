<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="ecoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="url(#ecoGrad)" />
  
  <!-- Tree branches -->
  <g opacity="0.3">
    <path d="M200 150 Q180 120 160 100" stroke="#22c55e" stroke-width="3" fill="none"/>
    <path d="M200 150 Q220 120 240 100" stroke="#22c55e" stroke-width="3" fill="none"/>
    <path d="M200 150 Q170 140 140 130" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M200 150 Q230 140 260 130" stroke="#22c55e" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Central leaf/eco symbol -->
  <g transform="translate(200, 150)">
    <!-- Main leaf -->
    <path d="M0 -40 Q-30 -30 -35 0 Q-30 30 0 40 Q30 30 35 0 Q30 -30 0 -40Z" 
          fill="white" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Leaf veins -->
    <path d="M0 -35 L0 35" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <path d="M0 -20 Q-15 -10 -20 5" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <path d="M0 -20 Q15 -10 20 5" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <path d="M0 5 Q-10 15 -15 25" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <path d="M0 5 Q10 15 15 25" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    
    <!-- Water drop inside leaf -->
    <path d="M0 -10 Q-5 0 0 10 Q5 0 0 -10" fill="url(#leafGrad)" opacity="0.8"/>
  </g>
  
  <!-- Small leaves around -->
  <g transform="translate(120, 80) rotate(-30)">
    <path d="M0 -15 Q-10 -12 -12 0 Q-10 12 0 15 Q10 12 12 0 Q10 -12 0 -15Z" 
          fill="#22c55e" opacity="0.6"/>
  </g>
  
  <g transform="translate(280, 90) rotate(30)">
    <path d="M0 -12 Q-8 -10 -10 0 Q-8 10 0 12 Q8 10 10 0 Q8 -10 0 -12Z" 
          fill="#22c55e" opacity="0.5"/>
  </g>
  
  <g transform="translate(130, 200) rotate(45)">
    <path d="M0 -10 Q-7 -8 -8 0 Q-7 8 0 10 Q7 8 8 0 Q7 -8 0 -10Z" 
          fill="#22c55e" opacity="0.7"/>
  </g>
  
  <!-- Floating eco particles -->
  <circle cx="90" cy="100" r="3" fill="#22c55e" opacity="0.4"/>
  <circle cx="310" cy="110" r="2" fill="#22c55e" opacity="0.3"/>
  <circle cx="100" cy="190" r="2.5" fill="#22c55e" opacity="0.5"/>
  <circle cx="300" cy="180" r="2" fill="#22c55e" opacity="0.4"/>
</svg>
