<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="productGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="16" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background subtle -->
  <rect width="600" height="400" fill="url(#bgGradient)" opacity="0.05"/>
  
  <!-- Product main body -->
  <rect x="200" y="100" width="200" height="200" rx="24" fill="url(#productGradient)" filter="url(#shadow)"/>
  
  <!-- Product screen -->
  <rect x="220" y="120" width="160" height="100" rx="12" fill="#0f172a" opacity="0.9"/>
  
  <!-- Water drop icon -->
  <path d="M300 150 C300 145, 305 140, 305 145 C305 140, 310 145, 310 150 C310 155, 305 160, 305 160 C305 160, 300 155, 300 150 Z" 
        fill="#60a5fa" opacity="0.8"/>
  
  <!-- Status indicators -->
  <circle cx="240" cy="140" r="4" fill="#10b981"/>
  <circle cx="255" cy="140" r="4" fill="#10b981"/>
  <circle cx="270" cy="140" r="4" fill="#10b981"/>
  
  <!-- Product details -->
  <rect x="250" y="240" width="100" height="8" rx="4" fill="#ffffff" opacity="0.2"/>
  <rect x="250" y="255" width="80" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
  
  <!-- Base -->
  <rect x="220" y="300" width="160" height="20" rx="8" fill="url(#productGradient)" opacity="0.6"/>
  
  <!-- Water particles -->
  <circle cx="180" cy="120" r="3" fill="#60a5fa" opacity="0.4"/>
  <circle cx="420" cy="180" r="2" fill="#60a5fa" opacity="0.3"/>
  <circle cx="150" cy="200" r="2.5" fill="#60a5fa" opacity="0.35"/>
  <circle cx="450" cy="140" r="2" fill="#60a5fa" opacity="0.25"/>
</svg>
