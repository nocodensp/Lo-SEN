<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="hormoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="moleculeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="150" r="120" fill="url(#hormoneGrad)" />
  
  <!-- Hormone molecule visualization -->
  <g transform="translate(150, 150)">
    <!-- Hexagonal ring structure -->
    <g transform="rotate(30)">
      <!-- Hexagon -->
      <path d="M-30 0 L-15 -26 L15 -26 L30 0 L15 26 L-15 26 Z" 
            fill="none" stroke="#8b5cf6" stroke-width="2"/>
      
      <!-- Carbon atoms -->
      <circle cx="-30" cy="0" r="3" fill="url(#moleculeGrad)"/>
      <circle cx="-15" cy="-26" r="3" fill="url(#moleculeGrad)"/>
      <circle cx="15" cy="-26" r="3" fill="url(#moleculeGrad)"/>
      <circle cx="30" cy="0" r="3" fill="url(#moleculeGrad)"/>
      <circle cx="15" cy="26" r="3" fill="url(#moleculeGrad)"/>
      <circle cx="-15" cy="26" r="3" fill="url(#moleculeGrad)"/>
      
      <!-- Functional groups -->
      <circle cx="-45" cy="0" r="4" fill="#ef4444"/>
      <text x="-45" y="-8" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="bold">OH</text>
      <line x1="-33" y1="0" x2="-41" y2="0" stroke="#ef4444" stroke-width="2"/>
      
      <circle cx="45" cy="0" r="4" fill="#ef4444"/>
      <text x="45" y="-8" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="bold">OH</text>
      <line x1="33" y1="0" x2="41" y2="0" stroke="#ef4444" stroke-width="2"/>
      
      <circle cx="0" cy="-40" r="4" fill="#3b82f6"/>
      <text x="0" y="-48" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="bold">CH₃</text>
      <line x1="0" y1="-29" x2="0" y2="-36" stroke="#3b82f6" stroke-width="2"/>
      
      <circle cx="0" cy="40" r="4" fill="#3b82f6"/>
      <text x="0" y="52" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="bold">CH₃</text>
      <line x1="0" y1="29" x2="0" y2="36" stroke="#3b82f6" stroke-width="2"/>
    </g>
    
    <!-- Hormone label -->
    <text x="0" y="80" text-anchor="middle" fill="#7c3aed" font-size="14" font-weight="bold">Hormones</text>
    <text x="0" y="95" text-anchor="middle" fill="#7c3aed" font-size="8" opacity="0.8">Endocrine Disruptors</text>
  </g>
  
  <!-- Body silhouette with affected areas -->
  <g transform="translate(150, 150)" opacity="0.3">
    <!-- Simple body outline -->
    <ellipse cx="0" cy="-40" rx="15" ry="20" fill="none" stroke="#8b5cf6" stroke-width="1"/> <!-- Head -->
    <path d="M0 -20 L-10 10 L-8 40 L8 40 L10 10 Z" fill="none" stroke="#8b5cf6" stroke-width="1"/> <!-- Body -->
    
    <!-- Affected areas -->
    <circle cx="0" cy="-35" r="3" fill="#ef4444"/> <!-- Brain -->
    <circle cx="-8" cy="0" r="2" fill="#ef4444"/> <!-- Heart -->
    <circle cx="8" cy="0" r="2" fill="#ef4444"/> <!-- Lungs -->
    <circle cx="0" cy="20" r="2.5" fill="#ef4444"/> <!-- Reproductive -->
    
    <!-- Warning arrows pointing to affected areas -->
    <path d="M-20 -45 L-10 -38" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowhead)"/>
    <path d="M-20 -5 L-12 -2" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowhead)"/>
    <path d="M20 -5 L12 -2" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowhead)"/>
    <path d="M-20 25 L-5 22" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Floating hormone molecules -->
  <g transform="translate(80, 80) scale(0.3)">
    <path d="M-30 0 L-15 -26 L15 -26 L30 0 L15 26 L-15 26 Z" 
          fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="-30" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="-15" cy="-26" r="3" fill="#8b5cf6"/>
    <circle cx="15" cy="-26" r="3" fill="#8b5cf6"/>
    <circle cx="30" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="15" cy="26" r="3" fill="#8b5cf6"/>
    <circle cx="-15" cy="26" r="3" fill="#8b5cf6"/>
  </g>
  
  <g transform="translate(220, 90) scale(0.25) rotate(45)">
    <path d="M-30 0 L-15 -26 L15 -26 L30 0 L15 26 L-15 26 Z" 
          fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="-30" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="-15" cy="-26" r="3" fill="#8b5cf6"/>
    <circle cx="15" cy="-26" r="3" fill="#8b5cf6"/>
    <circle cx="30" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="15" cy="26" r="3" fill="#8b5cf6"/>
    <circle cx="-15" cy="26" r="3" fill="#8b5cf6"/>
  </g>
  
  <g transform="translate(90, 220) scale(0.35) rotate(-30)">
    <path d="M-30 0 L-15 -26 L15 -26 L30 0 L15 26 L-15 26 Z" 
          fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="-30" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="-15" cy="-26" r="3" fill="#8b5cf6"/>
    <circle cx="15" cy="-26" r="3" fill="#8b5cf6"/>
    <circle cx="30" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="15" cy="26" r="3" fill="#8b5cf6"/>
    <circle cx="-15" cy="26" r="3" fill="#8b5cf6"/>
  </g>
  
  <!-- Warning symbols -->
  <circle cx="80" cy="120" r="2" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="220" cy="130" r="1.5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="90" cy="180" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="210" cy="170" r="1.8" fill="#8b5cf6" opacity="0.4"/>
</svg>
