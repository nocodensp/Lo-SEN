<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="microGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="particleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="150" r="120" fill="url(#microGrad)" />
  
  <!-- Water container/glass -->
  <g transform="translate(150, 150)">
    <!-- Glass outline -->
    <path d="M-40 -60 L-35 40 L35 40 L40 -60 Z" 
          fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="2"/>
    <path d="M-40 -60 Q0 -65 40 -60" 
          fill="none" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Water level -->
    <path d="M-35 20 L33 20 L35 40 L-35 40 Z" 
          fill="rgba(59, 130, 246, 0.2)"/>
    
    <!-- Microplastic particles -->
    <!-- Fragment 1 -->
    <g transform="translate(-20, -20) rotate(25)">
      <rect x="-8" y="-4" width="16" height="8" fill="url(#particleGrad)" rx="2"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="white" stroke-width="0.5" opacity="0.5"/>
    </g>
    
    <!-- Fragment 2 -->
    <g transform="translate(15, -10) rotate(-15)">
      <rect x="-6" y="-3" width="12" height="6" fill="url(#particleGrad)" rx="1"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="white" stroke-width="0.5" opacity="0.5"/>
    </g>
    
    <!-- Fragment 3 -->
    <g transform="translate(-10, 10) rotate(45)">
      <rect x="-5" y="-5" width="10" height="10" fill="url(#particleGrad)" rx="2"/>
      <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="0.5" opacity="0.5"/>
    </g>
    
    <!-- Fragment 4 -->
    <g transform="translate(20, 15) rotate(60)">
      <rect x="-4" y="-6" width="8" height="12" fill="url(#particleGrad)" rx="1"/>
      <line x1="-2" y1="0" x2="2" y2="0" stroke="white" stroke-width="0.5" opacity="0.5"/>
    </g>
    
    <!-- Fragment 5 -->
    <g transform="translate(-25, 5) rotate(-30)">
      <rect x="-7" y="-3" width="14" height="6" fill="url(#particleGrad)" rx="2"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="0.5" opacity="0.5"/>
    </g>
    
    <!-- Fragment 6 - very small -->
    <circle cx="5" cy="25" r="2" fill="url(#particleGrad)"/>
    <circle cx="-15" cy="30" r="1.5" fill="url(#particleGrad)"/>
    <circle cx="25" cy="-5" r="1.8" fill="url(#particleGrad)"/>
    
    <!-- Warning symbol -->
    <g transform="translate(0, -80)">
      <circle cx="0" cy="0" r="15" fill="#ef4444" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-size="18" font-weight="bold">!</text>
    </g>
  </g>
  
  <!-- Floating particles outside glass -->
  <circle cx="80" cy="80" r="3" fill="#ef4444" opacity="0.4"/>
  <circle cx="220" cy="90" r="2" fill="#ef4444" opacity="0.3"/>
  <circle cx="90" cy="220" r="2.5" fill="#ef4444" opacity="0.5"/>
  <circle cx="210" cy="210" r="2" fill="#ef4444" opacity="0.4"/>
</svg>
