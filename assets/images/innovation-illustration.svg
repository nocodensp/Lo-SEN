<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="innovationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="url(#innovationGrad)" />
  
  <!-- Circuit board pattern -->
  <g opacity="0.3">
    <path d="M100 100 L150 100 L150 120 L180 120" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="150" cy="100" r="4" fill="#8b5cf6"/>
    <circle cx="180" cy="120" r="4" fill="#8b5cf6"/>
    
    <path d="M220 100 L250 100 L250 140 L280 140" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="250" cy="100" r="4" fill="#8b5cf6"/>
    <circle cx="280" cy="140" r="4" fill="#8b5cf6"/>
    
    <path d="M120 200 L180 200 L180 180 L220 180" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <circle cx="180" cy="200" r="4" fill="#8b5cf6"/>
    <circle cx="220" cy="180" r="4" fill="#8b5cf6"/>
  </g>
  
  <!-- Central gear/microchip -->
  <g transform="translate(200, 150)">
    <!-- Outer gear -->
    <path d="M-8 -35 L8 -35 L10 -28 L28 -30 L35 -23 L30 -10 L35 -8 L35 8 L30 10 L35 23 L28 30 L10 28 L8 35 L-8 35 L-10 28 L-28 30 L-35 23 L-30 10 L-35 8 L-35 -8 L-30 -10 L-35 -23 L-28 -30 L-10 -28 Z" 
          fill="white" stroke="#8b5cf6" stroke-width="2"/>
    
    <!-- Inner chip -->
    <rect x="-15" y="-15" width="30" height="30" fill="url(#techGrad)" rx="3"/>
    
    <!-- Chip details -->
    <rect x="-10" y="-10" width="20" height="20" fill="white" opacity="0.3" rx="2"/>
    <circle cx="0" cy="0" r="3" fill="white"/>
    
    <!-- Connection points -->
    <circle cx="-20" cy="0" r="2" fill="#8b5cf6"/>
    <circle cx="20" cy="0" r="2" fill="#8b5cf6"/>
    <circle cx="0" cy="-20" r="2" fill="#8b5cf6"/>
    <circle cx="0" cy="20" r="2" fill="#8b5cf6"/>
  </g>
  
  <!-- Floating tech particles -->
  <rect x="80" y="80" width="8" height="8" fill="#8b5cf6" opacity="0.4" transform="rotate(45 84 84)"/>
  <rect x="310" y="90" width="6" height="6" fill="#8b5cf6" opacity="0.3" transform="rotate(45 313 93)"/>
  <rect x="90" y="210" width="7" height="7" fill="#8b5cf6" opacity="0.5" transform="rotate(45 93.5 213.5)"/>
  <rect x="300" y="200" width="5" height="5" fill="#8b5cf6" opacity="0.4" transform="rotate(45 302.5 202.5)"/>
</svg>
