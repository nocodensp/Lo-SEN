<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="a1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="a2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="a3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Main body -->
  <rect x="50" y="30" width="200" height="240" rx="24" fill="url(#a1)" stroke="#94a3b8" stroke-width="2"/>
  <!-- Upper panel -->
  <rect x="70" y="50" width="160" height="60" rx="12" fill="white" stroke="#e2e8f0"/>
  <!-- Display -->
  <rect x="85" y="60" width="130" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- Digital readout -->
  <text x="150" y="78" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#0f172a">99.9%</text>
  <text x="150" y="92" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">PURE</text>
  <!-- Middle section - filters -->
  <rect x="70" y="125" width="160" height="90" rx="12" fill="#f1f5f9"/>
  <!-- Filter stages -->
  <rect x="85" y="135" width="130" height="16" rx="8" fill="url(#a2)" opacity="0.3"/>
  <rect x="85" y="158" width="130" height="16" rx="8" fill="url(#a2)" opacity="0.5"/>
  <rect x="85" y="181" width="130" height="16" rx="8" fill="url(#a2)" opacity="0.7"/>
  <!-- Bottom - reservoir indicator -->
  <rect x="70" y="230" width="160" height="30" rx="0 0 24 24" fill="url(#a3)" opacity="0.2"/>
  <rect x="80" y="235" width="140" height="20" rx="10" fill="url(#a3)" opacity="0.4"/>
  <!-- Brand -->
  <text x="150" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#475569">AQUILA PRO</text>
</svg>