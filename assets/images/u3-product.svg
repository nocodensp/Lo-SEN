<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="u1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="u2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="u3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Industrial frame -->
  <rect x="40" y="20" width="220" height="260" rx="16" fill="url(#u1)" stroke="#94a3b8" stroke-width="2"/>
  <!-- Top control panel -->
  <rect x="60" y="40" width="180" height="55" rx="10" fill="white" stroke="#e2e8f0"/>
  <!-- Indicator lights -->
  <circle cx="85" cy="68" r="6" fill="#10b981"/>
  <circle cx="110" cy="68" r="6" fill="#3b82f6"/>
  <circle cx="135" cy="68" r="6" fill="#f59e0b"/>
  <!-- Digital display -->
  <rect x="155" y="55" width="70" height="25" rx="4" fill="#0f172a"/>
  <text x="190" y="72" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981">500 L/h</text>
  <!-- Multi-stage filtration cylinders -->
  <rect x="60" y="110" width="40" height="90" rx="20" fill="url(#u2)" opacity="0.3"/>
  <rect x="110" y="110" width="40" height="90" rx="20" fill="url(#u2)" opacity="0.5"/>
  <rect x="160" y="110" width="40" height="90" rx="20" fill="url(#u2)" opacity="0.7"/>
  <rect x="210" y="110" width="30" height="90" rx="15" fill="url(#u2)" opacity="0.9"/>
  <!-- Pipelines -->
  <line x1="80" y1="200" x2="150" y2="215" stroke="#94a3b8" stroke-width="3"/>
  <line x1="150" y1="215" x2="220" y2="200" stroke="#94a3b8" stroke-width="3"/>
  <!-- Outlet -->
  <rect x="120" y="225" width="60" height="20" rx="6" fill="#64748b"/>
  <rect x="140" y="245" width="20" height="15" rx="4" fill="#475569"/>
  <!-- IoT icon -->
  <path d="M230 50l15 15-15 15" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <circle cx="252" cy="65" r="3" fill="#3b82f6"/>
  <!-- Brand -->
  <text x="150" y="278" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#475569">U3 INDUSTRIAL</text>
