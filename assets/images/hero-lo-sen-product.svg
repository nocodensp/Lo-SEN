<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="productGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c75;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#0077b6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#productGradient)" opacity="0.1"/>
  
  <!-- Main product shape -->
  <rect x="120" y="150" width="160" height="100" rx="20" fill="url(#productGradient)" filter="url(#glow)"/>
  
  <!-- Water drop symbol -->
  <path d="M200 180 C200 175, 205 170, 205 175 C205 170, 210 175, 210 180 C210 185, 205 190, 205 190 C205 190, 200 185, 200 180 Z" 
        fill="white" opacity="0.9"/>
  
  <!-- Product details -->
  <circle cx="150" cy="200" r="8" fill="white" opacity="0.7"/>
  <circle cx="200" cy="200" r="8" fill="white" opacity="0.7"/>
  <circle cx="250" cy="200" r="8" fill="white" opacity="0.7"/>
  
  <!-- Base -->
  <rect x="140" y="250" width="120" height="20" rx="5" fill="url(#productGradient)" opacity="0.6"/>
  
  <!-- Floating particles -->
  <circle cx="100" cy="120" r="3" fill="#00b4d8" opacity="0.6">
    <animate attributeName="cy" values="120;100;120" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="280" r="2" fill="#0077b6" opacity="0.5">
    <animate attributeName="cy" values="280;260;280" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="150" r="2.5" fill="#00b4d8" opacity="0.4">
    <animate attributeName="cy" values="150;130;150" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
