<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="qualityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="url(#qualityGrad)" />
  
  <!-- Sparkle rays -->
  <g opacity="0.3">
    <path d="M200 50 L200 70" stroke="#f59e0b" stroke-width="2"/>
    <path d="M200 230 L200 250" stroke="#f59e0b" stroke-width="2"/>
    <path d="M100 150 L120 150" stroke="#f59e0b" stroke-width="2"/>
    <path d="M280 150 L300 150" stroke="#f59e0b" stroke-width="2"/>
    <path d="M130 80 L145 95" stroke="#f59e0b" stroke-width="2"/>
    <path d="M255 205 L270 220" stroke="#f59e0b" stroke-width="2"/>
    <path d="M270 80 L255 95" stroke="#f59e0b" stroke-width="2"/>
    <path d="M145 205 L130 220" stroke="#f59e0b" stroke-width="2"/>
  </g>
  
  <!-- Central star with badge -->
  <g transform="translate(200, 150)">
    <!-- Outer star -->
    <path d="M0 -45 L12 -18 L40 -15 L20 5 L25 35 L0 20 L-25 35 L-20 5 L-40 -15 L-12 -18 Z" 
          fill="white" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Inner star -->
    <path d="M0 -30 L8 -12 L27 -10 L13 3 L17 23 L0 13 L-17 23 L-13 3 L-27 -10 L-8 -12 Z" 
          fill="url(#starGrad)"/>
    
    <!-- Center checkmark -->
    <path d="M-8 0 L-3 5 L8 -6" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Small stars around -->
  <g transform="translate(120, 90)">
    <path d="M0 -8 L2 -3 L7 -2 L3 2 L4 7 L0 4 L-4 7 L-3 2 L-7 -2 L-2 -3 Z" 
          fill="#f59e0b" opacity="0.6"/>
  </g>
  
  <g transform="translate(280, 100)">
    <path d="M0 -6 L1.5 -2 L5 -1.5 L2 1.5 L3 5 L0 3 L-3 5 L-2 1.5 L-5 -1.5 L-1.5 -2 Z" 
          fill="#f59e0b" opacity="0.5"/>
  </g>
  
  <g transform="translate(130, 200)">
    <path d="M0 -7 L1.5 -2.5 L6 -2 L2.5 2 L3 6 L0 3.5 L-3 6 L-2.5 2 L-6 -2 L-1.5 -2.5 Z" 
          fill="#f59e0b" opacity="0.7"/>
  </g>
  
  <!-- Floating quality particles -->
  <circle cx="90" cy="120" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="310" cy="130" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="100" cy="180" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="300" cy="170" r="1.8" fill="#f59e0b" opacity="0.4"/>
</svg>
