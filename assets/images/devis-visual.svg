<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="d1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="d2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f4c75"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <!-- Background card -->
  <rect x="20" y="20" width="360" height="360" rx="24" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Header -->
  <rect x="20" y="20" width="360" height="80" rx="24 24 0 0" fill="url(#d2)"/>
  <text x="200" y="65" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="white">Besoin d'un conseil ?</text>
  <!-- Expert illustration -->
  <circle cx="120" cy="170" r="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="120" cy="158" r="14" fill="#94a3b8"/>
  <ellipse cx="120" cy="190" rx="24" ry="14" fill="#94a3b8"/>
  <!-- Clipboard -->
  <rect x="230" y="130" width="50" height="65" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="240" y1="145" x2="270" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="240" y1="155" x2="270" y2="155" stroke="#10b981" stroke-width="2"/>
  <line x1="240" y1="165" x2="260" y2="165" stroke="#f59e0b" stroke-width="2"/>
  <!-- Speech bubble -->
  <path d="M160 240l-30 30 10-30" fill="#f1f5f9" stroke="#cbd5e1"/>
  <rect x="130" y="215" width="120" height="36" rx="10" fill="white" stroke="#cbd5e1"/>
  <text x="190" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">Devis personnalisé</text>
  <text x="190" y="245" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">sous 24h</text>
  <!-- Contact bubbles -->
  <rect x="60" y="280" width="130" height="40" rx="20" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="125" y="303" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">📞 06 12 34 56 78</text>
  <rect x="210" y="280" width="130" height="40" rx="20" fill="#d1fae5" stroke="#10b981"/>
  <text x="275" y="303" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#059669">💬 WhatsApp</text>
  <!-- Footer line -->
  <rect x="20" y="350" width="360" height="30" rx="0 0 24 24" fill="#f8fafc"/>
  <text x="200" y="370" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">LO-SEN · Purification d'Eau Premium</text>
</svg>